<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Administración — Citas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2f;
    --accent: #c9a96e;
    --accent2: #e8c99a;
    --danger: #e05c5c;
    --success: #5ce08a;
    --text: #f0ece4;
    --muted: #7a7870;
    --muted2: #4a4845;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* ── Login screen ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3rem;
    width: 100%;
    max-width: 440px;
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    margin-bottom: 0.25rem;
    letter-spacing: -0.02em;
  }

  .login-sub {
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  .field label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    padding: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }

  .error-msg {
    color: var(--danger);
    font-size: 0.75rem;
    margin-top: 1rem;
    text-align: center;
    min-height: 1rem;
  }

  /* ── Main app ── */
  #app { display: none; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .header-left span {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .btn-logout {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }

  .btn-logout:hover { color: var(--danger); }

  /* ── Stats bar ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--bg);
    padding: 1.25rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Main content ── */
  main {
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .search-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0.65rem 1rem;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted2); }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.65rem 1.25rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0e0e0f;
  }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    padding: 0.85rem 1.25rem;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    background: var(--surface2);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: rowIn 0.3s ease both;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  td {
    padding: 1rem 1.25rem;
    vertical-align: middle;
  }

  .email-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
  }

  .email-name {
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 0.15rem;
  }

  .date-cell {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--accent2);
  }

  .date-time {
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 0.15rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge-future {
    background: rgba(92, 224, 138, 0.1);
    color: var(--success);
    border: 1px solid rgba(92, 224, 138, 0.2);
  }

  .badge-today {
    background: rgba(201, 169, 110, 0.15);
    color: var(--accent);
    border: 1px solid rgba(201, 169, 110, 0.3);
  }

  .badge-past {
    background: rgba(122, 120, 112, 0.1);
    color: var(--muted);
    border: 1px solid var(--muted2);
  }

  .event-id {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--muted2);
    color: var(--muted);
    padding: 0.35rem 0.75rem;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-cancel:hover {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(224, 92, 92, 0.06);
  }

  /* ── Empty / loading ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .empty p {
    font-size: 0.8rem;
    letter-spacing: 0.06em;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 3rem auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    padding: 0.85rem 1.5rem;
    border-radius: 2px;
    font-size: 0.8rem;
    font-weight: 500;
    z-index: 999;
    transform: translateY(8px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  #toast.success { background: var(--success); color: #0e0e0f; }
  #toast.error   { background: var(--danger);  color: #fff; }

  /* ── Confirm modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  #modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 2rem;
    max-width: 400px;
    width: 90%;
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .modal p {
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .modal-cita {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent2);
    background: var(--bg);
    padding: 0.75rem;
    border-radius: 2px;
    margin-bottom: 1.5rem;
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
  }

  .btn-confirm-cancel {
    background: var(--danger);
    color: #fff;
    border: none;
    padding: 0.65rem 1.25rem;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s;
  }

  .btn-confirm-cancel:hover { opacity: 0.85; }

  .btn-abort {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.65rem 1.25rem;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }

  .btn-abort:hover { border-color: var(--muted); color: var(--text); }

  @media (max-width: 768px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header { padding: 1rem; }
    main { padding: 1rem; }
    .filters { flex-wrap: wrap; }
    .event-id { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">Agenda</div>
    <div class="login-sub">Panel de Administración</div>
    <div class="field">
      <label>Supabase URL</label>
      <input type="text" id="sb-url" placeholder="https://xxxx.supabase.co" />
    </div>
    <div class="field">
      <label>Anon Key</label>
      <input type="password" id="sb-key" placeholder="eyJhbGciOiJIUzI1NiIs..." />
    </div>
    <button class="btn-primary" onclick="conectar()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <h1>Agenda</h1>
      <span>Panel de Administración</span>
    </div>
    <div class="header-right">
      <button class="btn-refresh" onclick="cargarCitas()">↻ Actualizar</button>
      <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Citas futuras</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-hoy">—</div>
      <div class="stat-label">Hoy</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-semana">—</div>
      <div class="stat-label">Esta semana</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-clientes">—</div>
      <div class="stat-label">Clientes únicos</div>
    </div>
  </div>

  <main>
    <div class="filters">
      <input type="text" class="search-box" id="search" placeholder="Buscar por email o nombre..." oninput="filtrar()" />
      <button class="filter-btn active" id="f-todas" onclick="setFiltro('todas')">Todas</button>
      <button class="filter-btn" id="f-hoy" onclick="setFiltro('hoy')">Hoy</button>
      <button class="filter-btn" id="f-semana" onclick="setFiltro('semana')">Esta semana</button>
    </div>

    <div class="table-wrap">
      <div id="table-content">
        <div class="spinner"></div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div class="modal">
    <h3>Cancelar cita</h3>
    <p>¿Confirmas que quieres eliminar esta cita? El evento se borrará de Supabase. El agente sincronizará con Google Calendar en la próxima ejecución.</p>
    <div class="modal-cita" id="modal-info"></div>
    <div class="modal-actions">
      <button class="btn-abort" onclick="cerrarModal()">Volver</button>
      <button class="btn-confirm-cancel" onclick="confirmarCancelacion()">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const { createClient } = supabase;
  let sb = null;
  let todasLasCitas = [];
  let filtroActivo = 'todas';
  let citaParaCancelar = null;

  // ── Conexión ──────────────────────────────────────────────────────────────
  async function conectar() {
    const url = document.getElementById('sb-url').value.trim();
    const key = document.getElementById('sb-key').value.trim();
    const err = document.getElementById('login-error');

    if (!url || !key) { err.textContent = 'Rellena los dos campos.'; return; }

    try {
      sb = createClient(url, key);
      const { error } = await sb.from('citas').select('id').limit(1);
      if (error) throw error;

      localStorage.setItem('sb_url', url);
      localStorage.setItem('sb_key', key);

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await cargarCitas();
    } catch (e) {
      err.textContent = 'No se pudo conectar. Revisa la URL y la key.';
    }
  }

  function cerrarSesion() {
    localStorage.removeItem('sb_url');
    localStorage.removeItem('sb_key');
    sb = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  // ── Autoconexión si hay credenciales guardadas ────────────────────────────
  window.addEventListener('load', () => {
    const url = localStorage.getItem('sb_url');
    const key = localStorage.getItem('sb_key');
    if (url && key) {
      document.getElementById('sb-url').value = url;
      document.getElementById('sb-key').value = key;
      conectar();
    }
  });

  // ── Cargar citas ──────────────────────────────────────────────────────────
  async function cargarCitas() {
    document.getElementById('table-content').innerHTML = '<div class="spinner"></div>';

    const { data, error } = await sb
      .from('citas')
      .select('*')
      .order('fecha_cita', { ascending: true });

    if (error) { toast('Error al cargar citas', 'error'); return; }

    todasLasCitas = data || [];
    actualizarStats();
    renderTabla();
  }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function actualizarStats() {
    const ahora = new Date();
    const hoy = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
    const finSemana = new Date(hoy); finSemana.setDate(hoy.getDate() + 7);

    const futuras = todasLasCitas.filter(c => new Date(c.fecha_cita) >= ahora);
    const deHoy   = futuras.filter(c => {
      const d = new Date(c.fecha_cita);
      return d >= hoy && d < new Date(hoy.getTime() + 86400000);
    });
    const semana  = futuras.filter(c => new Date(c.fecha_cita) < finSemana);
    const clientes = new Set(futuras.map(c => c.email)).size;

    document.getElementById('stat-total').textContent    = futuras.length;
    document.getElementById('stat-hoy').textContent      = deHoy.length;
    document.getElementById('stat-semana').textContent   = semana.length;
    document.getElementById('stat-clientes').textContent = clientes;
  }

  // ── Filtros ───────────────────────────────────────────────────────────────
  function setFiltro(f) {
    filtroActivo = f;
    ['todas','hoy','semana'].forEach(id => {
      document.getElementById('f-' + id).classList.toggle('active', id === f);
    });
    renderTabla();
  }

  function filtrar() { renderTabla(); }

  function getCitasFiltradas() {
    const ahora = new Date();
    const hoy   = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate());
    const query = document.getElementById('search').value.toLowerCase();

    return todasLasCitas.filter(c => {
      const fecha = new Date(c.fecha_cita);
      let ok = true;

      if (filtroActivo === 'hoy') {
        ok = fecha >= hoy && fecha < new Date(hoy.getTime() + 86400000);
      } else if (filtroActivo === 'semana') {
        const fin = new Date(hoy); fin.setDate(hoy.getDate() + 7);
        ok = fecha >= ahora && fecha < fin;
      }

      if (query) ok = ok && c.email.toLowerCase().includes(query);
      return ok;
    });
  }

  // ── Render tabla ──────────────────────────────────────────────────────────
  function renderTabla() {
    const citas = getCitasFiltradas();
    const wrap  = document.getElementById('table-content');

    if (citas.length === 0) {
      wrap.innerHTML = `
        <div class="empty">
          <div class="empty-icon">◈</div>
          <p>No hay citas para mostrar</p>
        </div>`;
      return;
    }

    const ahora = new Date();
    const hoyStr = new Date().toDateString();

    const rows = citas.map((c, i) => {
      const fecha = new Date(c.fecha_cita);
      const esHoy   = fecha.toDateString() === hoyStr;
      const esPasada = fecha < ahora;

      const badge = esPasada
        ? `<span class="badge badge-past">Pasada</span>`
        : esHoy
          ? `<span class="badge badge-today">● Hoy</span>`
          : `<span class="badge badge-future">● Próxima</span>`;

      // Parsear nombre del email "Nombre <email@>" o solo email
      const emailMatch = c.email.match(/^(.*?)\s*<(.+?)>$/);
      const nombre = emailMatch ? emailMatch[1].trim() : '';
      const emailPuro = emailMatch ? emailMatch[2] : c.email;

      const fechaStr = fecha.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      const horaStr  = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

      return `<tr style="animation-delay: ${i * 0.03}s">
        <td>
          <div class="email-cell">${emailPuro}</div>
          ${nombre ? `<div class="email-name">${nombre}</div>` : ''}
        </td>
        <td>
          <div class="date-cell">${fechaStr}</div>
          <div class="date-time">${horaStr}</div>
        </td>
        <td>${badge}</td>
        <td><div class="event-id" title="${c.event_id}">${c.event_id}</div></td>
        <td>
          ${!esPasada ? `<button class="btn-cancel" onclick="abrirModal(${JSON.stringify(c).replace(/'/g, "&#39;")})">Cancelar</button>` : '<span style="color:var(--muted2);font-size:0.7rem">—</span>'}
        </td>
      </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Fecha y hora</th>
            <th>Estado</th>
            <th>Event ID</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function abrirModal(cita) {
    citaParaCancelar = cita;
    const fecha = new Date(cita.fecha_cita);
    const fechaStr = fecha.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const horaStr  = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

    document.getElementById('modal-info').textContent =
      `${cita.email}\n${fechaStr} a las ${horaStr}`;
    document.getElementById('modal-overlay').classList.add('show');
  }

  function cerrarModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    citaParaCancelar = null;
  }

  async function confirmarCancelacion() {
    if (!citaParaCancelar) return;
    cerrarModal();

    const { error } = await sb
      .from('citas')
      .delete()
      .eq('event_id', citaParaCancelar.event_id)
      .eq('email', citaParaCancelar.email);

    if (error) {
      toast('Error al eliminar la cita', 'error');
    } else {
      toast('Cita eliminada. El agente sincronizará Calendar en breve.', 'success');
      await cargarCitas();
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg, tipo = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${tipo}`;
    setTimeout(() => t.className = '', 3000);
  }

  // ── Cerrar modal al hacer click fuera ────────────────────────────────────
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) cerrarModal();
  });
</script>
</body>
</html>
